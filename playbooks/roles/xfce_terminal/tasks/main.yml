- name: Install Xfce-Terminal
  apt: name=xfce4-terminal state=present

- name: Remove terminalrc configuration
  file:
    path: "{{ ansible_env.HOME }}/.config/xfce4/terminal/terminalrc"
    state: absent

- name: Symlink terminalrc configuration
  file:
    src: "{{ role_path }}/files/terminalrc"
    dest: "{{ ansible_env.HOME }}/.config/xfce4/terminal/terminalrc"
    state: link
